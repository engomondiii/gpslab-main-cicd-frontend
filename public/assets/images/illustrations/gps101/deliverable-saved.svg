<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <defs>
    <linearGradient id="saved-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="document-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="300" fill="url(#saved-bg)"/>
  
  <!-- Document -->
  <g id="document">
    <!-- Main document body -->
    <rect x="80" y="60" width="140" height="180" rx="8" fill="url(#document-gradient)" stroke="#667eea" stroke-width="3"/>
    
    <!-- Folded corner -->
    <path d="M 220 60 L 220 90 L 190 90 Z" fill="#667eea" opacity="0.3"/>
    <path d="M 220 90 L 190 90 L 220 60" stroke="#667eea" stroke-width="2" fill="none"/>
    
    <!-- Text lines -->
    <line x1="100" y1="90" x2="180" y2="90" stroke="#667eea" stroke-width="3" opacity="0.3"/>
    <line x1="100" y1="110" x2="200" y2="110" stroke="#764ba2" stroke-width="2" opacity="0.3"/>
    <line x1="100" y1="125" x2="190" y2="125" stroke="#667eea" stroke-width="2" opacity="0.3"/>
    <line x1="100" y1="140" x2="195" y2="140" stroke="#764ba2" stroke-width="2" opacity="0.3"/>
    <line x1="100" y1="155" x2="185" y2="155" stroke="#667eea" stroke-width="2" opacity="0.3"/>
    <line x1="100" y1="170" x2="200" y2="170" stroke="#764ba2" stroke-width="2" opacity="0.3"/>
    <line x1="100" y1="185" x2="180" y2="185" stroke="#667eea" stroke-width="2" opacity="0.3"/>
    <line x1="100" y1="200" x2="190" y2="200" stroke="#764ba2" stroke-width="2" opacity="0.3"/>
    
    <!-- GPS 101 watermark -->
    <text x="150" y="230" font-family="Arial, sans-serif" font-size="12" fill="#667eea" text-anchor="middle" opacity="0.2">GPS 101</text>
  </g>
  
  <!-- Save icon (cloud) -->
  <g transform="translate(150, 120)">
    <ellipse cx="0" cy="0" rx="25" ry="15" fill="#3498db" opacity="0.8"/>
    <circle cx="-12" cy="-5" r="12" fill="#3498db" opacity="0.8"/>
    <circle cx="12" cy="-5" r="12" fill="#3498db" opacity="0.8"/>
    
    <!-- Checkmark in cloud -->
    <path d="M -8 0 L -3 5 L 8 -6" 
          stroke="#fff" 
          stroke-width="3" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"/>
  </g>
  
  <!-- Floating save indicators -->
  <g id="save-particles" opacity="0.6">
    <circle cx="60" cy="150" r="4" fill="#667eea">
      <animate attributeName="cy" values="150;130;150" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="240" cy="140" r="3" fill="#764ba2">
      <animate attributeName="cy" values="140;120;140" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="200" r="5" fill="#3498db">
      <animate attributeName="cy" values="200;180;200" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Text -->
  <text x="150" y="270" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#667eea" text-anchor="middle">
    Deliverable Saved
  </text>
  <text x="150" y="288" font-family="Arial, sans-serif" font-size="12" fill="#764ba2" text-anchor="middle" opacity="0.8">
    Your work is secure
  </text>
</svg>