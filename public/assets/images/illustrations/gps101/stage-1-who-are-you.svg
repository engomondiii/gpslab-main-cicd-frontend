<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="gps101-stage1-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="gps101-mirror-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#gps101-stage1-bg)"/>
  
  <!-- Person silhouette looking in mirror -->
  <g id="person">
    <!-- Body -->
    <ellipse cx="150" cy="220" rx="30" ry="40" fill="#667eea" opacity="0.6"/>
    <!-- Head -->
    <circle cx="150" cy="160" r="25" fill="#667eea"/>
    <!-- Arms contemplating -->
    <path d="M 120 190 Q 110 200 115 210" stroke="#667eea" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M 180 190 Q 190 200 185 210" stroke="#667eea" stroke-width="8" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Mirror frame -->
  <g id="mirror">
    <!-- Frame -->
    <rect x="220" y="80" width="120" height="180" rx="60" fill="none" stroke="#764ba2" stroke-width="8"/>
    <rect x="225" y="85" width="110" height="170" rx="55" fill="url(#gps101-mirror-gradient)" opacity="0.3"/>
    
    <!-- Reflection - more detailed, introspective -->
    <g opacity="0.9">
      <!-- Reflected head with inner details -->
      <circle cx="280" cy="160" r="25" fill="#764ba2"/>
      <!-- Inner circle representing core self -->
      <circle cx="280" cy="160" r="15" fill="#fff" opacity="0.3"/>
      <circle cx="280" cy="160" r="8" fill="#764ba2"/>
      
      <!-- Reflected body -->
      <ellipse cx="280" cy="220" rx="30" ry="40" fill="#764ba2" opacity="0.6"/>
    </g>
    
    <!-- Question marks floating around reflection -->
    <text x="250" y="110" font-family="Arial, sans-serif" font-size="20" fill="#667eea" opacity="0.6">?</text>
    <text x="300" y="120" font-family="Arial, sans-serif" font-size="16" fill="#764ba2" opacity="0.5">?</text>
    <text x="310" y="240" font-family="Arial, sans-serif" font-size="18" fill="#667eea" opacity="0.6">?</text>
  </g>
  
  <!-- Thought bubbles with identity elements -->
  <g id="thoughts">
    <!-- Values bubble -->
    <circle cx="80" cy="100" r="20" fill="#fff" opacity="0.8"/>
    <text x="73" y="107" font-family="Arial, sans-serif" font-size="20" fill="#667eea">❤️</text>
    
    <!-- Strengths bubble -->
    <circle cx="120" cy="70" r="18" fill="#fff" opacity="0.8"/>
    <text x="114" y="76" font-family="Arial, sans-serif" font-size="18" fill="#764ba2">💪</text>
    
    <!-- Passions bubble -->
    <circle cx="50" cy="130" r="16" fill="#fff" opacity="0.8"/>
    <text x="45" y="136" font-family="Arial, sans-serif" font-size="16" fill="#667eea">🔥</text>
  </g>
  
  <!-- Stage title -->
  <text x="200" y="290" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#667eea" text-anchor="middle">
    Who Are You?
  </text>
</svg>