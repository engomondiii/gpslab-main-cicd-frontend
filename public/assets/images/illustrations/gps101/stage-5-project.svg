<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="gps101-stage5-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="rocket-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="flame-gradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e74c3c;stop-opacity:0.6" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#gps101-stage5-bg)"/>
  
  <!-- Stars in background -->
  <g id="stars" opacity="0.6">
    <circle cx="50" cy="40" r="2" fill="#f39c12"/>
    <circle cx="80" cy="60" r="1.5" fill="#667eea"/>
    <circle cx="350" cy="50" r="2" fill="#764ba2"/>
    <circle cx="320" cy="80" r="1.5" fill="#f39c12"/>
    <circle cx="370" cy="120" r="2" fill="#667eea"/>
    <circle cx="30" cy="100" r="1.5" fill="#764ba2"/>
    <circle cx="60" cy="140" r="2" fill="#f39c12"/>
  </g>
  
  <!-- Rocket -->
  <g id="project-rocket">
    <!-- Rocket body -->
    <ellipse cx="200" cy="140" rx="35" ry="70" fill="url(#rocket-gradient)"/>
    
    <!-- Rocket nose cone -->
    <path d="M 200 70 L 165 110 L 235 110 Z" fill="#667eea"/>
    
    <!-- Window -->
    <circle cx="200" cy="130" r="18" fill="#fff" opacity="0.9"/>
    <circle cx="200" cy="130" r="15" fill="#667eea" opacity="0.3"/>
    
    <!-- GPS 101 logo in window -->
    <text x="200" y="137" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#667eea" text-anchor="middle">GPS</text>
    
    <!-- Rocket fins -->
    <path d="M 165 180 L 145 220 L 165 210 Z" fill="#764ba2"/>
    <path d="M 235 180 L 255 220 L 235 210 Z" fill="#764ba2"/>
    
    <!-- Rocket details -->
    <rect x="190" y="150" width="20" height="5" fill="#fff" opacity="0.3"/>
    <rect x="190" y="165" width="20" height="5" fill="#fff" opacity="0.3"/>
  </g>
  
  <!-- Rocket flames -->
  <g id="flames">
    <!-- Main flame -->
    <ellipse cx="200" cy="225" rx="30" ry="35" fill="url(#flame-gradient)">
      <animate attributeName="ry" values="35;40;35" dur="0.5s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Inner flame -->
    <ellipse cx="200" cy="220" rx="20" ry="25" fill="#f39c12" opacity="0.8">
      <animate attributeName="ry" values="25;30;25" dur="0.5s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Core flame -->
    <ellipse cx="200" cy="215" rx="10" ry="15" fill="#fff" opacity="0.9">
      <animate attributeName="ry" values="15;20;15" dur="0.5s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Flame particles -->
    <circle cx="185" cy="240" r="4" fill="#f39c12" opacity="0.6">
      <animate attributeName="cy" values="240;260;240" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="215" cy="235" r="3" fill="#e74c3c" opacity="0.6">
      <animate attributeName="cy" values="235;255;235" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="245" r="5" fill="#f39c12" opacity="0.6">
      <animate attributeName="cy" values="245;265;245" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Launch trajectory path -->
  <path d="M 200 210 Q 180 150 200 90" stroke="#667eea" stroke-width="2" stroke-dasharray="5,5" fill="none" opacity="0.4"/>
  
  <!-- Purpose elements floating -->
  <g id="purpose-elements" opacity="0.7">
    <!-- Identity -->
    <g transform="translate(120, 80)">
      <circle cx="0" cy="0" r="15" fill="#fff" opacity="0.8"/>
      <text x="-5" y="5" font-family="Arial, sans-serif" font-size="16" fill="#667eea">I</text>
    </g>
    
    <!-- Problem -->
    <g transform="translate(280, 100)">
      <circle cx="0" cy="0" r="15" fill="#fff" opacity="0.8"/>
      <text x="-5" y="5" font-family="Arial, sans-serif" font-size="16" fill="#764ba2">P</text>
    </g>
    
    <!-- Owner -->
    <g transform="translate(100, 180)">
      <circle cx="0" cy="0" r="15" fill="#fff" opacity="0.8"/>
      <text x="-6" y="5" font-family="Arial, sans-serif" font-size="16" fill="#667eea">O</text>
    </g>
    
    <!-- Story -->
    <g transform="translate(300, 180)">
      <circle cx="0" cy="0" r="15" fill="#fff" opacity="0.8"/>
      <text x="-5" y="5" font-family="Arial, sans-serif" font-size="16" fill="#764ba2">S</text>
    </g>
  </g>
  
  <!-- Motion lines -->
  <g id="motion" opacity="0.3">
    <path d="M 180 200 L 170 210" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
    <path d="M 220 200 L 230 210" stroke="#764ba2" stroke-width="2" stroke-linecap="round"/>
    <path d="M 175 215 L 165 225" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
    <path d="M 225 215 L 235 225" stroke="#764ba2" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Stage title -->
  <text x="200" y="285" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#667eea" text-anchor="middle">
    Launch Your Project
  </text>
</svg>