<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <defs>
    <linearGradient id="pass-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:0.2" />
    </linearGradient>
    <radialGradient id="checkmark-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:0.2" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="300" fill="url(#pass-bg)"/>
  
  <!-- Celebration confetti -->
  <g id="confetti" opacity="0.6">
    <rect x="50" y="40" width="8" height="12" fill="#f39c12" transform="rotate(15 54 46)"/>
    <rect x="200" y="50" width="10" height="8" fill="#e74c3c" transform="rotate(-20 205 54)"/>
    <circle cx="80" cy="70" r="5" fill="#667eea"/>
    <circle cx="230" cy="80" r="6" fill="#764ba2"/>
    <rect x="120" y="30" width="6" height="10" fill="#2ecc71" transform="rotate(30 123 35)"/>
    <rect x="180" y="35" width="9" height="7" fill="#f39c12" transform="rotate(-10 184.5 38.5)"/>
  </g>
  
  <!-- Large checkmark circle -->
  <circle cx="150" cy="150" r="80" fill="url(#checkmark-glow)"/>
  <circle cx="150" cy="150" r="75" fill="none" stroke="#2ecc71" stroke-width="8"/>
  
  <!-- Checkmark -->
  <path d="M 110 150 L 135 175 L 190 120" 
        stroke="#2ecc71" 
        stroke-width="12" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none"/>
  
  <!-- Inner white glow on checkmark -->
  <path d="M 110 150 L 135 175 L 190 120" 
        stroke="#fff" 
        stroke-width="6" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none" 
        opacity="0.6"/>
  
  <!-- Pulse rings -->
  <circle cx="150" cy="150" r="90" fill="none" stroke="#2ecc71" stroke-width="3" opacity="0.4">
    <animate attributeName="r" values="90;110;90" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="150" cy="150" r="100" fill="none" stroke="#27ae60" stroke-width="2" opacity="0.3">
    <animate attributeName="r" values="100;120;100" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Success sparkles -->
  <g id="sparkles">
    <g transform="translate(80, 100)">
      <path d="M 0 -8 L 2 -2 L 8 0 L 2 2 L 0 8 L -2 2 L -8 0 L -2 -2 Z" fill="#f39c12"/>
    </g>
    <g transform="translate(220, 130)">
      <path d="M 0 -6 L 1.5 -1.5 L 6 0 L 1.5 1.5 L 0 6 L -1.5 1.5 L -6 0 L -1.5 -1.5 Z" fill="#fff" opacity="0.8"/>
    </g>
    <g transform="translate(100, 210)">
      <path d="M 0 -7 L 1.8 -1.8 L 7 0 L 1.8 1.8 L 0 7 L -1.8 1.8 L -7 0 L -1.8 -1.8 Z" fill="#2ecc71"/>
    </g>
    <g transform="translate(200, 200)">
      <path d="M 0 -5 L 1.2 -1.2 L 5 0 L 1.2 1.2 L 0 5 L -1.2 1.2 L -5 0 L -1.2 -1.2 Z" fill="#667eea" opacity="0.7"/>
    </g>
  </g>
  
  <!-- Text -->
  <text x="150" y="265" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2ecc71" text-anchor="middle">
    Checkpoint Passed!
  </text>
  <text x="150" y="285" font-family="Arial, sans-serif" font-size="14" fill="#27ae60" text-anchor="middle" opacity="0.8">
    Continue to next stage
  </text>
</svg>